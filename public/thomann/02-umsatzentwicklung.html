<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Umsatzentwicklung — Thomann Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,700;1,6..72,500&display=swap" rel="stylesheet" />
  <style>
    /* --- Design Tokens (christianmaass.com) — dunkles Theme über Foto --- */
    :root {
      --font-family-base: 'Montserrat', Arial, sans-serif;
      --font-family-display: 'Newsreader', 'Source Serif Pro', Georgia, serif;

      --weight-light: 300;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-bold: 700;

      --container-max-width: 1200px;
      --container-padding-x: 1.5rem;

      /* Color-Tokens 1:1 von christianmaass.com (Light-Theme) */
      --color-bg: #f6f1e8;
      --color-bg-elevated: #fcf8ee;
      --color-text: #1a1a1a;
      --color-text-strong: #000000;
      --color-text-muted: #5a5a5a;
      --color-border-subtle: rgba(0,0,0,0.08);
      --color-border-strong: rgba(0,0,0,0.16);
      --color-accent: #315a78;          /* Petrol – Markenakzent (Headline) */
      --color-accent-hover: #264a64;
      --color-on-accent: #ffffff;
      --color-bar: #315a78;             /* Petrol – feste Säulen */
      --color-bar-placeholder: rgba(49,90,120,0.16); /* Petrol, sehr hell – Platzhalter */
      --color-bar-placeholder-border: rgba(49,90,120,0.4);

      --radius-sm: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--font-family-base);
      font-weight: var(--weight-light);
      color: var(--color-text);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      isolation: isolate;
    }

    /* Originalfoto als gedämpfte Graustufen-Ebene hinter dem Creme-Ton */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-color: var(--color-bg);
      background-image: url('assets/hero.jpg');
      background-image: -webkit-image-set(url('assets/hero.webp') type('image/webp'), url('assets/hero.jpg') type('image/jpeg'));
      background-image: image-set(url('assets/hero.webp') type('image/webp'), url('assets/hero.jpg') type('image/jpeg'));
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: grayscale(1) brightness(1.05) contrast(1.02);
    }
    /* Creme-Ton mit Transparenz darüber – Foto bleibt erkennbar, aber hell */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(
        180deg,
        rgba(246,241,232,0.86) 0%,
        rgba(246,241,232,0.88) 55%,
        rgba(246,241,232,0.92) 100%
      );
    }

    .slide {
      flex: 1;
      width: 100%;
      max-width: var(--container-max-width);
      margin: 0 auto;
      padding: clamp(2.5rem, 6vh, 4.5rem) var(--container-padding-x) clamp(2rem, 5vh, 3.5rem);
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: content-in 1s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }
    @keyframes content-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    body.is-leaving .slide { transition: opacity 0.4s ease; opacity: 0; }
    @media (prefers-reduced-motion: reduce) {
      .slide { animation: none; opacity: 1; transform: none; }
    }

    .eyebrow {
      font-family: var(--font-family-base);
      font-size: 0.72rem;
      font-weight: var(--weight-medium);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-bar);
      margin: 0 0 0.75rem 0;
    }

    .slide__title {
      font-family: var(--font-family-display);
      font-weight: var(--weight-medium);
      font-size: clamp(1.8rem, 3.9vw, 3.0rem);
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: var(--color-text-strong);
      margin: 0;
      max-width: 26ch;
    }
    .slide__title .accent { color: var(--color-accent); }

    .slide__lead {
      margin: 1rem 0 0 0;
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--color-text);
      max-width: 60ch;
    }

    /* --- Chart --- */
    .chart {
      margin-top: clamp(1.75rem, 4vh, 3rem);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }

    .chart__plot {
      position: relative;
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: clamp(2px, 0.5vw, 8px);
      padding-top: 3rem;
      border-bottom: 1px solid var(--color-border-strong);
    }

    .bar {
      position: relative;
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      height: 100%;
      cursor: default;
    }

    .bar__fill {
      width: 100%;
      background: var(--color-bar);
      border-radius: 3px 3px 0 0;
      transition: filter 0.18s ease;
      transform-origin: bottom;
      animation: grow-bar 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .bar.is-placeholder .bar__fill {
      background: var(--color-bar-placeholder);
      border: 1px dashed var(--color-bar-placeholder-border);
      border-bottom: none;
    }

    .bar:hover .bar__fill { filter: brightness(1.12); }

    .bar__value {
      position: absolute;
      bottom: 100%;
      margin-bottom: 6px;
      font-family: var(--font-family-base);
      font-size: clamp(0.9rem, 1.5vw, 1.3rem);
      font-weight: var(--weight-medium);
      color: var(--color-text-strong);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    .bar.is-key .bar__value { opacity: 1; }
    .bar:hover .bar__value { opacity: 1; }

    .chart__labels {
      display: flex;
      gap: clamp(2px, 0.5vw, 8px);
      margin-top: 0.6rem;
    }
    .chart__labels span {
      flex: 1 1 0;
      min-width: 0;
      text-align: center;
      font-family: var(--font-family-base);
      font-size: clamp(0.8rem, 1.25vw, 1.08rem);
      color: var(--color-text-muted);
    }
    .chart__labels span.is-key { color: var(--color-text-strong); font-weight: var(--weight-medium); }

    .chart__footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .legend { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .legend__item {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--color-text-muted);
    }
    .legend__swatch { width: 16px; height: 16px; border-radius: 3px; }
    .legend__swatch--solid { background: var(--color-bar); }
    .legend__swatch--placeholder {
      background: var(--color-bar-placeholder);
      border: 1px dashed var(--color-bar-placeholder-border);
    }
    .note {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      font-style: italic;
      max-width: 48ch;
    }

    @keyframes grow-bar {
      from { transform: scaleY(0); }
      to   { transform: scaleY(1); }
    }

    /* --- Slide-Navigation --- */
    .deck-nav {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      z-index: 50;
    }
    .deck-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.25);
      background: rgba(255,255,255,0.7);
      color: rgba(0,0,0,0.7);
      text-decoration: none;
      font-size: 1.1rem;
      backdrop-filter: blur(4px);
      transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .deck-nav a:hover { color: var(--color-accent); border-color: var(--color-accent); transform: translateY(-1px); }

    @media (max-width: 640px) {
      .bar__value { display: none; }
      .bar.is-key .bar__value { display: block; }
      .chart__labels span:not(.is-key) { font-size: 0.42rem; }
    }
    .brand-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 60; pointer-events: none; }
    .brand-bar__inner {
      max-width: var(--container-max-width, 1200px);
      margin: 0 auto;
      padding: clamp(2.9rem, 6.4vh, 5.0rem) var(--container-padding-x, 1.5rem) 0;
      display: flex;
      justify-content: flex-end;
    }
    .brand-logo { height: 52px; width: auto; filter: brightness(0); opacity: 0.85; }
    .byline{position:fixed;bottom:1.25rem;left:0;right:0;z-index:55;pointer-events:none;} .byline__inner{max-width:var(--container-max-width,1200px);margin:0 auto;padding:0 var(--container-padding-x,1.5rem);} .byline__text{font-size:0.8rem;color:var(--color-text-muted,#5a5a5a);letter-spacing:0.02em;}
  </style>
</head>
<body>
  <div class="brand-bar"><div class="brand-bar__inner"><img class="brand-logo" src="assets/logo.png" alt="Thomann Music" /></div></div>
  <div class="byline"><div class="byline__inner"><span class="byline__text">Dr. Christian Maaß</span></div></div>
  <main class="slide">
    <h1 class="slide__title">Wir verkaufen Emotionen und ein Lebensgefühl</h1>

    <section class="chart" aria-label="Säulendiagramm Umsatzentwicklung">
      <div class="chart__plot" id="plot"></div>
      <div class="chart__labels" id="labels"></div>
    </section>
  </main>

  <nav class="deck-nav" aria-label="Präsentationsnavigation">
    <a href="index.html" id="prev" aria-label="Zurück zur Startseite">←</a>
    <a href="03-musiker.html" id="next" aria-label="Weiter zu Seite 3">→</a>
  </nav>

  <script>
    // Datenpunkte: { jahr, umsatz (Mio €), platzhalter, key }
    // key = Wert wird dauerhaft über der Säule angezeigt
    // platzhalter = heller/gestrichelt, Wert noch zu liefern
    const DATA = [
      { jahr: 2006, umsatz: 177,  platzhalter: false },
      { jahr: 2007, umsatz: 241,  platzhalter: false },
      { jahr: 2008, umsatz: 284,  platzhalter: false },
      { jahr: 2009, umsatz: 326,  platzhalter: false },
      { jahr: 2010, umsatz: 395,  platzhalter: false },
      { jahr: 2011, umsatz: 453,  platzhalter: false },
      { jahr: 2012, umsatz: 500,  platzhalter: false },
      { jahr: 2013, umsatz: 526,  platzhalter: false },
      { jahr: 2014, umsatz: 599,  platzhalter: false },
      { jahr: 2015, umsatz: 656,  platzhalter: false },
      { jahr: 2016, umsatz: 715,  platzhalter: false },
      { jahr: 2017, umsatz: 771,  platzhalter: false },
      { jahr: 2018, umsatz: 846,  platzhalter: false },
      { jahr: 2019, umsatz: 979,  platzhalter: false },
      { jahr: 2020, umsatz: 1125, platzhalter: false },
      { jahr: 2021, umsatz: 1242, platzhalter: false },
      { jahr: 2022, umsatz: 1340, platzhalter: false },
      { jahr: 2023, umsatz: 1450, platzhalter: false },
      { jahr: 2024, umsatz: 1527, platzhalter: false },
      { jahr: 2025, umsatz: 1658, platzhalter: false },
      { jahr: 2026, umsatz: 1750, platzhalter: true,  key: true },
    ];

    const max = Math.max(...DATA.map(d => d.umsatz));

    function fmt(v) {
      if (v >= 1000) {
        return (v / 1000).toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 2 }) + ' Mrd';
      }
      return v.toLocaleString('de-DE') + ' Mio';
    }

    const plot = document.getElementById('plot');
    const labels = document.getElementById('labels');

    DATA.forEach((d, i) => {
      const bar = document.createElement('div');
      bar.className = 'bar'
        + (d.platzhalter ? ' is-placeholder' : '')
        + (d.key ? ' is-key' : '');
      bar.dataset.jahr = d.jahr;
      bar.title = d.jahr + ': ' + fmt(d.umsatz) + ' €' + (d.platzhalter ? ' (Plan)' : '');

      const value = document.createElement('span');
      value.className = 'bar__value';
      value.textContent = fmt(d.umsatz) + (d.platzhalter ? ' (Plan)' : '');

      const fill = document.createElement('div');
      fill.className = 'bar__fill';
      fill.style.height = (d.umsatz / max * 100) + '%';
      // Balken nach Content-Einblendung wachsen lassen
      fill.style.animationDelay = (0.4 + i * 0.04) + 's';

      bar.appendChild(value);
      bar.appendChild(fill);
      plot.appendChild(bar);

      const lab = document.createElement('span');
      if (d.key) lab.className = 'is-key';
      lab.textContent = d.jahr;
      labels.appendChild(lab);
    });

    // Pfeiltasten-Navigation: links = zurück, rechts = vor
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function go(url) {
      if (reduce) { window.location.href = url; return; }
      document.body.classList.add('is-leaving');
      setTimeout(() => { window.location.href = url; }, 400);
    }
    document.getElementById('prev').addEventListener('click', (e) => { e.preventDefault(); go('index.html'); });
    document.getElementById('next').addEventListener('click', (e) => { e.preventDefault(); go('03-musiker.html'); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') go('index.html');
      else if (e.key === 'ArrowRight') go('03-musiker.html');
    });
  </script>
</body>
</html>
