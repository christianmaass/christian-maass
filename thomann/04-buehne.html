<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Auf der Bühne und vor der Kamera — Thomann Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,700;1,6..72,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-family-base: 'Montserrat', Arial, sans-serif;
      --font-family-display: 'Newsreader', 'Source Serif Pro', Georgia, serif;
      --weight-light: 300;
      --weight-regular: 400;
      --weight-medium: 500;
      --weight-bold: 700;
      --container-max-width: 1200px;
      --container-padding-x: 1.5rem;

      --color-bg: #f6f1e8;
      --color-bg-elevated: #fcf8ee;
      --color-text: #1a1a1a;
      --color-text-strong: #000000;
      --color-text-muted: #5a5a5a;
      --color-border-subtle: rgba(0,0,0,0.08);
      --color-border-strong: rgba(0,0,0,0.16);
      --color-accent: #315a78;
      --color-accent-hover: #264a64;
      --color-on-accent: #ffffff;
      --radius-sm: 0.5rem;
      --radius-md: 1rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--font-family-base);
      font-weight: var(--weight-light);
      color: var(--color-text);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      isolation: isolate;
    }
    body.is-leaving .slide { transition: opacity 0.4s ease; opacity: 0; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-color: var(--color-bg);
      background-image: url('assets/hero.jpg');
      background-image: -webkit-image-set(url('assets/hero.webp') type('image/webp'), url('assets/hero.jpg') type('image/jpeg'));
      background-image: image-set(url('assets/hero.webp') type('image/webp'), url('assets/hero.jpg') type('image/jpeg'));
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: grayscale(1) brightness(1.05) contrast(1.02);
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(246,241,232,0.86) 0%, rgba(246,241,232,0.88) 55%, rgba(246,241,232,0.92) 100%);
    }

    /* Logo-Anker oben rechts, auf Titelhöhe */
    .brand-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 60; pointer-events: none; }
    .brand-bar__inner {
      max-width: var(--container-max-width, 1200px);
      margin: 0 auto;
      padding: clamp(2.9rem, 6.4vh, 5.0rem) var(--container-padding-x, 1.5rem) 0;
      display: flex;
      justify-content: flex-end;
    }
    .brand-logo { height: 52px; width: auto; filter: brightness(0); opacity: 0.85; }

    .slide {
      flex: 1;
      width: 100%;
      max-width: var(--container-max-width);
      margin: 0 auto;
      padding: clamp(2.5rem, 6vh, 4.5rem) var(--container-padding-x) clamp(2rem, 5vh, 3.5rem);
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: content-in 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }
    @keyframes content-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide__title {
      font-family: var(--font-family-display);
      font-weight: var(--weight-medium);
      font-size: clamp(1.8rem, 3.9vw, 3.0rem);
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: var(--color-text-strong);
      margin: 0;
    }
    .slide__title .accent { color: var(--color-accent); }

    /* --- Video-Embeds --- */
    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(0.8rem, 1.8vw, 1.4rem);
      align-items: center;
      width: 100%;
      margin: auto 0;
    }
    .frame {
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .frame iframe { display: block; width: 100%; height: 100%; border: 0; }
    .frame.wide  { width: 100%; aspect-ratio: 16 / 9; }

    @media (max-width: 720px) { .videos { grid-template-columns: 1fr; } }

    @media (prefers-reduced-motion: reduce) { .slide { animation: none; opacity: 1; transform: none; } }

    /* --- Slide-Navigation --- */
    .deck-nav { position: fixed; bottom: 1.25rem; right: 1.5rem; display: flex; gap: 0.5rem; z-index: 50; }
    .deck-nav a {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.25); background: rgba(255,255,255,0.7); color: rgba(0,0,0,0.7);
      text-decoration: none; font-size: 1.1rem; backdrop-filter: blur(4px);
      transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .deck-nav a:hover { color: var(--color-accent); border-color: var(--color-accent); transform: translateY(-1px); }
    .byline{position:fixed;bottom:1.25rem;left:0;right:0;z-index:55;pointer-events:none;} .byline__inner{max-width:var(--container-max-width,1200px);margin:0 auto;padding:0 var(--container-padding-x,1.5rem);} .byline__text{font-size:0.8rem;color:var(--color-text-muted,#5a5a5a);letter-spacing:0.02em;}
  </style>
</head>
<body>
  <div class="brand-bar"><div class="brand-bar__inner"><img class="brand-logo" src="assets/logo.png" alt="Thomann Music" /></div></div>
  <div class="byline"><div class="byline__inner"><span class="byline__text">Dr. Christian Maaß</span></div></div>
  <main class="slide">
    <h1 class="slide__title">Unsere Mitarbeiter stehen auf der<br>Bühne – und vor der Kamera</h1>

    <div class="videos">
      <div class="frame wide">
        <iframe src="https://www.youtube-nocookie.com/embed/VLgNd4Uz9N8?rel=0" title="Thomann – Video 1" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <div class="frame wide">
        <iframe src="https://www.youtube-nocookie.com/embed/VpXuBUOFviY?rel=0" title="Thomann – Video 2" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
    </div>
  </main>

  <nav class="deck-nav" aria-label="Präsentationsnavigation">
    <a href="03-musiker.html" id="prev" aria-label="Zurück zu Seite 3">←</a>
    <a href="05-leitfragen.html" id="next" aria-label="Weiter zu Seite 5">→</a>
  </nav>

  <script>
    const PREV = '03-musiker.html';
    const NEXT = '05-leitfragen.html';
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function go(url) {
      if (reduce) { window.location.href = url; return; }
      document.body.classList.add('is-leaving');
      setTimeout(() => { window.location.href = url; }, 450);
    }
    document.getElementById('prev').addEventListener('click', (e) => { e.preventDefault(); go(PREV); });
    document.getElementById('next').addEventListener('click', (e) => { e.preventDefault(); go(NEXT); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') go(PREV);
      else if (e.key === 'ArrowRight') go(NEXT);
    });
  </script>
</body>
</html>
