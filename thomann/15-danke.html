<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Thank You — Thomann Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,700;1,6..72,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-family-base: 'Montserrat', Arial, sans-serif;
      --font-family-display: 'Newsreader', 'Source Serif Pro', Georgia, serif;
      --weight-light: 300; --weight-regular: 400; --weight-medium: 500; --weight-bold: 700;
      --letter-spacing-hero: -0.02em; --line-height-hero: 1.05;
      --font-size-hero: clamp(2.5rem, 5vw, 4.75rem);
      --color-bg: #f6f1e8; --color-bg-elevated: #fcf8ee;
      --color-text: #1a1a1a; --color-text-strong: #000000; --color-text-muted: #5a5a5a;
      --color-border-subtle: rgba(0,0,0,0.08); --color-border-strong: rgba(0,0,0,0.16);
      --color-accent: #315a78; --color-accent-hover: #264a64; --color-on-accent: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: var(--font-family-base);
      font-weight: var(--weight-light);
      color: var(--color-text-strong);
      background-color: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    .hero__content, .hero__author { transition: opacity 0.45s ease; }
    body.is-leaving .hero__content, body.is-leaving .hero__author { opacity: 0; }

    .hero {
      position: relative; height: 100vh; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: clamp(1.5rem, 6vh, 3.5rem); text-align: center; isolation: isolate;
      padding: clamp(3rem, 12vh, 9rem) 1.5rem clamp(2rem, 6vh, 4rem);
    }
    .hero::before {
      content: ""; position: absolute; inset: 0; z-index: -2; background-color: var(--color-bg);
      background-image: url('assets/hero.jpg');
      background-image: -webkit-image-set(url('assets/hero.webp') type('image/webp'), url('assets/hero.jpg') type('image/jpeg'));
      background-image: image-set(url('assets/hero.webp') type('image/webp'), url('assets/hero.jpg') type('image/jpeg'));
      background-size: cover; background-position: center; background-repeat: no-repeat;
      filter: grayscale(1) brightness(1.05) contrast(1.02);
    }
    .hero::after {
      content: ""; position: absolute; inset: 0; z-index: -1;
      background: linear-gradient(180deg, rgba(246,241,232,0.78) 0%, rgba(246,241,232,0.82) 55%, rgba(246,241,232,0.88) 100%);
    }

    .hero__content { animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .hero__title {
      font-family: var(--font-family-display);
      font-weight: var(--weight-medium);
      font-size: var(--font-size-hero);
      letter-spacing: var(--letter-spacing-hero);
      line-height: var(--line-height-hero);
      color: var(--color-text-strong);
    }
    .hero__author {
      font-family: var(--font-family-base);
      font-weight: var(--weight-medium);
      font-size: clamp(1rem, 2vw, 1.45rem);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--color-accent);
      animation: rise 1.1s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .hero__content, .hero__author { animation: none; } }

    .deck-nav { position: fixed; bottom: 1.25rem; right: 1.5rem; display: flex; gap: 0.5rem; z-index: 50; }
    .deck-nav a {
      display: inline-flex; align-items: center; justify-content: center;
      width: 44px; height: 44px; border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.25); background: rgba(255,255,255,0.7); color: rgba(0,0,0,0.7);
      text-decoration: none; font-size: 1.1rem; backdrop-filter: blur(4px);
      transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .deck-nav a:hover { color: var(--color-accent); border-color: var(--color-accent); transform: translateY(-1px); }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero__content">
      <h1 class="hero__title">Thank You!</h1>
    </div>
    <p class="hero__author">Dr. Christian Maaß</p>
  </main>

  <nav class="deck-nav" aria-label="Präsentationsnavigation">
    <a href="14-lemming.html" id="prev" aria-label="Zurück zu Seite 14">←</a>
  </nav>

  <script>
    const PREV = '14-lemming.html';
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function go(url) {
      if (reduce) { window.location.href = url; return; }
      document.body.classList.add('is-leaving');
      setTimeout(() => { window.location.href = url; }, 450);
    }
    document.getElementById('prev').addEventListener('click', (e) => { e.preventDefault(); go(PREV); });
    document.addEventListener('keydown', (e) => { if (e.key === 'ArrowLeft') go(PREV); });
  </script>
</body>
</html>
